<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "/usr/share/xml/fontconfig/fonts.dtd">

<fontconfig>
    <match target="pattern">
        <test qual="any" name="family"><string>Microsoft YaHei</string></test>
        <edit name="family" mode="assign" binding="strong"><string>sans-serif</string></edit>
    </match>

    <selectfont>
        <rejectfont>
            <pattern><patelt name="family"><string>DejaVu Sans</string></patelt></pattern>
            <pattern><patelt name="family"><string>Liberation Sans</string></patelt></pattern>
        </rejectfont>
    </selectfont>
</fontconfig>
